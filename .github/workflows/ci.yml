name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  checks:
    name: Lint, type-check & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: make lint

      - name: Type-check (core + app)
        run: make build

      - name: Unit tests (pure core)
        run: make test

      - name: Component tests (React Native Testing Library)
        run: make test-app
